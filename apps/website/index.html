<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stitch</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='256' height='256' viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='a' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%232196f3;stop-opacity:1'/%3E%3Cstop offset='100%25' style='stop-color:%2300e5ff;stop-opacity:1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='256' height='256' rx='55' fill='%231c1e2e'/%3E%3Ccircle cx='50' cy='50' r='15' fill='%232d314d'/%3E%3Ccircle cx='200' cy='50' r='15' fill='%232d314d'/%3E%3Ccircle cx='50' cy='200' r='15' fill='%232d314d'/%3E%3Ccircle cx='200' cy='200' r='15' fill='%232d314d'/%3E%3Cpath stroke='url(%23a)' stroke-width='18' stroke-linecap='round' d='M50 200 200 50'/%3E%3Cpath stroke='url(%23a)' stroke-width='18' stroke-linecap='round' d='m50 50 150 150'/%3E%3C/svg%3E" />
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        height: 100%;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        background: #000;
        color: #fff;
        font-size: 16px;
        line-height: 1.6;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 80px 24px;
        max-width: 640px;
        margin: 0 auto;
        width: 100%;
      }

      h1 {
        font-size: 2rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin-bottom: 20px;
      }

      p {
        font-size: 1rem;
        color: #aaa;
        max-width: 480px;
        margin-bottom: 12px;
      }

      p:last-of-type {
        margin-bottom: 60px;
      }

      .downloads {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        width: 100%;
      }

      .downloads-label {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #555;
        margin-bottom: 4px;
      }

      .downloads-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
      }

      .btn {
        display: inline-block;
        padding: 12px 24px;
        border: 1px solid #fff;
        text-decoration: none;
        color: #fff;
        font-size: 0.875rem;
        font-weight: 500;
        transition: background 0.15s, color 0.15s;
        white-space: nowrap;
      }

      .btn:hover {
        background: #fff;
        color: #000;
      }

      .btn-group {
        position: relative;
        display: inline-block;
      }

      .btn-group summary {
        display: inline-block;
        padding: 12px 24px;
        border: 1px solid #fff;
        text-decoration: none;
        color: #fff;
        font-size: 0.875rem;
        font-weight: 500;
        transition: background 0.15s, color 0.15s;
        white-space: nowrap;
        cursor: pointer;
        list-style: none;
      }

      .btn-group summary::-webkit-details-marker {
        display: none;
      }

      .btn-group summary::after {
        content: "";
        display: inline-block;
        width: 0;
        height: 0;
        margin-left: 8px;
        vertical-align: middle;
        border-left: 4px solid transparent;
        border-right: 4px solid transparent;
        border-top: 5px solid currentColor;
      }

      .btn-group[open] summary {
        background: #fff;
        color: #000;
        border-bottom-color: transparent;
      }

      .btn-group summary:hover {
        background: #fff;
        color: #000;
      }

      .btn-dropdown {
        position: absolute;
        top: 100%;
        left: -1px;
        right: -1px;
        display: flex;
        flex-direction: column;
        z-index: 10;
        border: 1px solid #fff;
        border-top: none;
        background: #000;
      }

      .btn-dropdown a {
        display: block;
        padding: 10px 24px;
        text-decoration: none;
        color: #fff;
        font-size: 0.8rem;
        font-weight: 400;
        white-space: nowrap;
        text-align: center;
        transition: background 0.15s, color 0.15s;
      }

      .btn-dropdown a + a {
        border-top: 1px solid #222;
      }

      .btn-dropdown a:hover {
        background: #fff;
        color: #000;
      }

      .btn-all {
        font-size: 0.8rem;
        color: #555;
        text-decoration: none;
        padding: 4px 0;
        border-bottom: 1px solid #333;
        transition: color 0.15s, border-color 0.15s;
      }

      .btn-all:hover {
        color: #fff;
        border-color: #fff;
      }

      footer {
        text-align: center;
        padding: 24px;
        font-size: 0.8rem;
        color: #555;
        border-top: 1px solid #222;
      }

      footer a {
        color: #555;
        text-decoration: none;
      }

      footer a:hover {
        color: #fff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Stitch</h1>
      <p>AI that works locally.</p>
      <p>
        Stitch runs entirely on your machine — your data stays yours.
        Connect your tools, automate your work, and let AI handle the rest.
      </p>

      <div class="downloads">
        <div class="downloads-label">Download</div>
        <div class="downloads-row">
          <a class="btn" href="https://github.com/UseStitch/stitch/releases/latest/download/Stitch-windows-setup.exe">
            Windows
          </a>
          <details class="btn-group">
            <summary>macOS</summary>
            <div class="btn-dropdown">
              <a href="https://github.com/UseStitch/stitch/releases/latest/download/Stitch-macos-arm64.dmg">Apple Silicon</a>
              <a href="https://github.com/UseStitch/stitch/releases/latest/download/Stitch-macos-x64.dmg">Intel</a>
            </div>
          </details>
        </div>
        <a class="btn-all" href="https://github.com/UseStitch/stitch/releases">All releases &rarr;</a>
      </div>
    </main>

    <footer>
      <p>
        Stitch &copy; 2026 &nbsp;&middot;&nbsp;
        <a href="https://github.com/UseStitch/stitch">GitHub</a>
      </p>
    </footer>
  </body>
  <script>
    document.addEventListener('click', function (e) {
      document.querySelectorAll('.btn-group[open]').forEach(function (d) {
        if (!d.contains(e.target)) d.removeAttribute('open');
      });
    });
  </script>
</html>
