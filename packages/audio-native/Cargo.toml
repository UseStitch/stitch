[package]
name = "stitch-audio-capture"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "stitch-audio-capture"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
cpal = "0.17"
hound = "3.5"
thiserror = "2"
rubato = "2"

[target.'cfg(target_os = "windows")'.dependencies]
wasapi = "0.23"

[target.'cfg(target_os = "macos")'.dependencies]
cidre = { version = "0.14", features = ["av"] }
