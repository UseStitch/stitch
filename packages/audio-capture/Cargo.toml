[package]
name = "stitch-audio-capture"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]
path = "src-rs/lib.rs"

[dependencies]
napi = { version = "3", default-features = false, features = ["napi6"] }
napi-derive = "3"

hypr-audio-actual = { workspace = true }
hypr-audio-utils = { workspace = true }
hypr-vad-masking = { workspace = true }

futures-util = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread"] }

[target.'cfg(target_os = "macos")'.dependencies]
cidre = { workspace = true }
libc = "0.2"

[build-dependencies]
napi-build = "2"

[workspace]
members = [
  "crates/audio",
  "crates/audio-actual",
  "crates/audio-interface",
  "crates/audio-utils",
  "crates/resampler",
  "crates/vad",
  "crates/vad-masking",
]

# Audio capture crates under crates/ are vendored from
# https://github.com/fastrepl/hyprnote (MIT). See crates/LICENSE.
[workspace.dependencies]
hypr-audio = { path = "crates/audio" }
hypr-audio-actual = { path = "crates/audio-actual" }
hypr-audio-interface = { path = "crates/audio-interface" }
hypr-audio-utils = { path = "crates/audio-utils" }
hypr-resampler = { path = "crates/resampler" }
hypr-vad = { path = "crates/vad" }
hypr-vad-masking = { path = "crates/vad-masking" }

anyhow = "1"
cidre = "0.15"
cpal = "0.17"
dasp = { version = "0.11.0", features = ["interpolate", "interpolate-linear"] }
earshot = "0.1.0"
futures-util = "0.3.31"
pin-project = "1"
ringbuf = "0.4.8"
serial_test = "3"
thiserror = "2"
tokio = "1"
tokio-stream = "0.1.17"
tokio-util = "0.7.15"
tracing = "0.1"
wasapi = "0.23.0"
