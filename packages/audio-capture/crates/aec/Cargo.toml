# Vendored from https://github.com/fastrepl/hyprnote (crates/aec), MIT licensed.
# See crates/LICENSE for the upstream license. Trimmed to the model_128 ONNX weights;
# the 256/512 model variants, snapshot tests, benches, and examples were dropped.
[package]
name = "aec"
version = "0.1.0"
edition = "2024"
license = "MIT"

[features]
default = ["onnx", "128"]
onnx = ["dep:hypr-onnx"]
128 = []

[dependencies]
hypr-onnx = { workspace = true, optional = true }

realfft = { workspace = true }

serde = { workspace = true }
thiserror = { workspace = true }
