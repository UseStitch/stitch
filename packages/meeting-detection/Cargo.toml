[package]
name = "stitch-meeting-detection"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]
path = "src-rs/lib.rs"

[dependencies]
napi = { version = "3", default-features = false, features = ["napi6"] }
napi-derive = "3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sysinfo = "0.37"

[target.'cfg(target_os = "windows")'.dependencies]
wasapi = "0.23"
windows = { version = "0.61", features = ["Win32_Foundation", "Win32_UI_WindowsAndMessaging"] }

[target.'cfg(target_os = "macos")'.dependencies]
cidre = { version = "0.15", features = ["av", "sc", "blocks", "async"] }

[build-dependencies]
napi-build = "2"
