name: Bug report
description: Report a reproducible problem in Stitch
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue. Please fill out the sections below so we can reproduce and fix the bug quickly.

  - type: input
    id: version
    attributes:
      label: Stitch version
      description: The app version where you observed the issue
      placeholder: 0.1.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      description: Include edition/build if relevant
      placeholder: Windows 11 24H2 (build 26100)
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead
      placeholder: The app crashes when I click ...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal, reliable reproduction
      placeholder: |
        1. Open Stitch
        2. Go to ...
        3. Click ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: It should ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or recordings
      description: Paste relevant logs or attach screenshots/recordings
      render: shell
    validations:
      required: false

  - type: textarea
    id: workaround
    attributes:
      label: Temporary workaround (optional)
      description: Did anything help you get unstuck?
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reliably reproduce this issue.
          required: false
