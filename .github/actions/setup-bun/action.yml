name: Setup Bun
description: Install Bun and project dependencies

runs:
  using: composite
  steps:
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: '1.3.8'

    - name: Cache bun global install cache (Windows)
      id: cache-bun-global
      if: runner.os == 'Windows'
      uses: actions/cache@v5
      with:
        path: C:\Users\runneradmin\AppData\Local\bun\install\cache
        key: ${{ runner.os }}-bun-global-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-global-

    - name: Cache node_modules (non-Windows)
      id: cache-node-modules
      if: runner.os != 'Windows'
      uses: actions/cache@v5
      with:
        path: |
          node_modules
          apps/*/node_modules
          packages/*/node_modules
          connectors/*/node_modules
        key: ${{ runner.os }}-node_modules-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-node_modules-

    - name: Install dependencies
      if: runner.os == 'Windows' || steps.cache-node-modules.outputs.cache-hit != 'true'
      shell: bash
      run: bun install --frozen-lockfile
