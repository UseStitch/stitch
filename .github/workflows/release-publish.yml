name: release-publish
run-name: 'release publish ${{ github.ref_name }}'

on:
  push:
    branches:
      - production

concurrency:
  group: release-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.detect.outputs.is_release }}
    steps:
      - name: Detect release commit
        id: detect
        run: |
          if [[ "${{ github.event.head_commit.message }}" =~ ^release:\ v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

  prepare-release:
    needs: detect
    if: needs.detect.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      previous_tag: ${{ steps.tag.outputs.previous_tag }}
      version: ${{ steps.tag.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}
      release_sha: ${{ steps.tag.outputs.release_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun

      - uses: ./.github/actions/setup-git-committer
        id: committer
        with:
          app-id: ${{ vars.STITCH_RELEASE_APP_ID }}
          app-private-key: ${{ secrets.STITCH_RELEASE_APP_PRIVATE_KEY }}
          bot-name: stitch-release[bot]
          bot-email: stitch-release[bot]@users.noreply.github.com

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Create or verify release tag
        id: tag
        env:
          GH_TOKEN: ${{ steps.committer.outputs.token }}
        run: bun run release:tag

  build-windows:
    needs: prepare-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}

      - uses: ./.github/actions/setup-bun

      - name: Build all packages
        shell: bash
        run: bun run build

      - name: Copy server binary to desktop resources
        shell: bash
        run: |
          mkdir -p apps/desktop/resources
          cp packages/server/dist/stitch-server.exe apps/desktop/resources/

      - name: Package Electron app
        shell: bash
        run: npx electron-builder --win --x64 --config electron-builder.config.ts
        working-directory: apps/desktop

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stitch-windows-x64
          path: apps/desktop/dist/*.exe
          if-no-files-found: error

  build-macos:
    needs: prepare-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}

      - uses: ./.github/actions/setup-bun

      - name: Build all packages
        shell: bash
        run: bun run build

      - name: Copy server binary to desktop resources
        shell: bash
        run: |
          mkdir -p apps/desktop/resources
          cp packages/server/dist/stitch-server apps/desktop/resources/

      - name: Package Electron app
        shell: bash
        run: npx electron-builder --mac --arm64 --config electron-builder.config.ts
        working-directory: apps/desktop

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stitch-macos-arm64
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
          if-no-files-found: error

  release:
    needs: [prepare-release, build-windows, build-macos]
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: stitch-windows-x64
          path: artifacts/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: stitch-macos-arm64
          path: artifacts/macos

      - name: Generate release notes body
        env:
          RELEASE_PREVIOUS_TAG: ${{ needs.prepare-release.outputs.previous_tag }}
          RELEASE_NOTES_PATH: ${{ runner.temp }}/release-notes.md
        run: bun run release:notes

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          target_commitish: ${{ needs.prepare-release.outputs.release_sha }}
          name: Stitch ${{ needs.prepare-release.outputs.tag }}
          body_path: ${{ runner.temp }}/release-notes.md
          files: |
            artifacts/windows/*
            artifacts/macos/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
