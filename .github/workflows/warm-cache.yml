name: warm-cache

on:
  push:
    branches:
      - master
    paths:
      - 'bun.lock'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  warm:
    name: warm cache (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: ./.github/actions/setup-bun
