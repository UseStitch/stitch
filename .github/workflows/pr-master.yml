name: pr-master

on:
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      run-ci: ${{ steps.filter.outputs.ci }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          predicate-quantifier: 'every'
          filters: |
            ci:
              - '**'
              - '!apps/website/**'
              - '!**/*.md'
              - '!**/*.txt'
              - '!LICENSE'
              - '!.opencode/**'
              - '!packages/server/src/skills/built-ins/**'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/CODEOWNERS'
            rust:
              - 'packages/audio-capture/**'
              - 'packages/meeting-detection/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  check:
    name: check (linux)
    needs: filter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        if: needs.filter.outputs.run-ci == 'true'
        uses: actions/checkout@v5

      - name: Setup Bun
        if: needs.filter.outputs.run-ci == 'true'
        uses: ./.github/actions/setup-bun

      - name: Setup Rust toolchain
        if: needs.filter.outputs.run-ci == 'true' && needs.filter.outputs.rust == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Rust test dependencies
        if: needs.filter.outputs.run-ci == 'true' && needs.filter.outputs.rust == 'true' && runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Cache Rust dependencies
        if: needs.filter.outputs.run-ci == 'true' && needs.filter.outputs.rust == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/audio-capture
            packages/meeting-detection
          shared-key: pr-master-${{ runner.os }}

      - name: Cache Turbo artifacts
        if: needs.filter.outputs.run-ci == 'true'
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Run typecheck
        if: needs.filter.outputs.run-ci == 'true'
        run: bun run typecheck

      - name: Run tests
        if: needs.filter.outputs.run-ci == 'true'
        run: bun run test

      - name: Run Rust tests
        if: needs.filter.outputs.run-ci == 'true' && needs.filter.outputs.rust == 'true'
        run: cargo test --manifest-path packages/audio-capture/Cargo.toml

      - name: Run meeting-detection Rust tests
        if: needs.filter.outputs.run-ci == 'true' && needs.filter.outputs.rust == 'true'
        run: cargo test --manifest-path packages/meeting-detection/Cargo.toml
