name: pr-master

on:
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      run-ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ci:
              - '**'
              - '!apps/website/**'
              - '!**/*.md'
              - '!LICENSE'
              - '!.opencode/**'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/CODEOWNERS'

  check:
    name: check (${{ matrix.os }})
    needs: filter
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout repository
        if: needs.filter.outputs.run-ci == 'true'
        uses: actions/checkout@v5

      - name: Setup Bun
        if: needs.filter.outputs.run-ci == 'true'
        uses: ./.github/actions/setup-bun

      - name: Cache Turbo artifacts
        if: needs.filter.outputs.run-ci == 'true'
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Run tests
        if: needs.filter.outputs.run-ci == 'true'
        run: bun run test

      - name: Run typecheck
        if: needs.filter.outputs.run-ci == 'true'
        run: bun run typecheck
