name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.bump }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure workflow is dispatched from master
        run: |
          if [ "${{ github.ref_name }}" != "master" ]; then
            echo "This workflow must be run from the master branch."
            exit 1
          fi

  check:
    name: check (${{ matrix.os }})
    needs: guard
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os:
          - windows-2022
          - macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
          shared-key: release-check-${{ runner.os }}

      - name: Cache Turbo artifacts
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/bun.lock', 'turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Run typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Run Rust tests
        run: cargo test --manifest-path native/Cargo.toml --workspace

  version:
    needs: check
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      commit: ${{ steps.commit.outputs.commit }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup git committer
        uses: ./.github/actions/setup-git-committer
        with:
          app-id: ${{ vars.STITCH_APP_ID }}
          app-private-key: ${{ secrets.STITCH_APP_PRIVATE_KEY }}
          bot-name: stitch[bot]
          bot-email: stitch[bot]@users.noreply.github.com

      - name: Bump version
        id: bump
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          node <<'EOF'
          const fs = require('node:fs')

          const bump = process.env.BUMP
          if (!['patch', 'minor', 'major'].includes(bump)) {
            throw new Error(`Unsupported bump type: ${bump}`)
          }

          const sourceFile = 'apps/desktop/package.json'
          const webFile = 'apps/web/package.json'
          const sourcePkg = JSON.parse(fs.readFileSync(sourceFile, 'utf8'))
          const current = String(sourcePkg.version ?? '')
          const parts = current.split('.').map(Number)

          if (parts.length !== 3 || parts.some((n) => !Number.isInteger(n) || n < 0)) {
            throw new Error(`Current version is not semver-compatible: ${current}`)
          }

          if (bump === 'major') {
            parts[0] += 1
            parts[1] = 0
            parts[2] = 0
          } else if (bump === 'minor') {
            parts[1] += 1
            parts[2] = 0
          } else {
            parts[2] += 1
          }

          const next = parts.join('.')

          const files = [sourceFile, webFile]
          const rootPkg = JSON.parse(fs.readFileSync('package.json', 'utf8'))
          if (typeof rootPkg.version === 'string' && rootPkg.version.length > 0) {
            files.push('package.json')
          }

          for (const file of files) {
            const json = JSON.parse(fs.readFileSync(file, 'utf8'))
            json.version = next
            fs.writeFileSync(file, `${JSON.stringify(json, null, 2)}\n`)
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${next}\n`)
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tag=v${next}\n`)
          EOF

      - name: Commit and tag
        id: commit
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          git add apps/desktop/package.json apps/web/package.json package.json
          git commit -m "chore(release): bump version to ${TAG}"
          git push origin HEAD:master
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2022
            os: windows
            arch: x64
            rust_target: x86_64-pc-windows-msvc
          - runner: macos-14
            os: macos
            arch: arm64
            rust_target: aarch64-apple-darwin
            package_script: package
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.version.outputs.commit }}

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
          shared-key: release-${{ matrix.rust_target }}

      - name: Cache Turbo artifacts
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/bun.lock', 'turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Cache Electron assets
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('apps/desktop/package.json', 'apps/desktop/electron-builder.config.ts', '**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Prepare Apple API key for notarization
        if: matrix.os == 'macos'
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
        run: |
          KEY_PATH="$RUNNER_TEMP/apple_api_key.p8"
          echo -n "$APPLE_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build desktop package
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ github.token }}
          CSC_LINK: ${{ matrix.os == 'macos' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_API_KEY_ID: ${{ matrix.os == 'macos' && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ matrix.os == 'macos' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_TEAM_ID: ${{ matrix.os == 'macos' && secrets.APPLE_TEAM_ID || '' }}
        run: bun run ${{ matrix.package_script || 'package' }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}-${{ matrix.arch || 'x64' }}
          if-no-files-found: error
          path: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
            apps/desktop/dist/*.blockmap
            apps/desktop/dist/latest*.yml
            apps/desktop/dist/latest*.yaml

  build-linux-server:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.version.outputs.commit }}

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Cache Turbo artifacts
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/bun.lock', 'turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build Linux server binary
        working-directory: packages/server
        run: bun run build

      - name: Upload Linux server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-linux-x64
          if-no-files-found: error
          path: packages/server/dist/stitch-server

  release:
    needs:
      - version
      - build
      - build-linux-server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.version.outputs.commit }}

      - name: Setup git committer
        id: auth
        uses: ./.github/actions/setup-git-committer
        with:
          app-id: ${{ vars.STITCH_APP_ID }}
          app-private-key: ${{ secrets.STITCH_APP_PRIVATE_KEY }}
          bot-name: stitch[bot]
          bot-email: stitch[bot]@users.noreply.github.com

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release-assets
          merge-multiple: true

      - name: Download Linux server artifact
        uses: actions/download-artifact@v4
        with:
          name: server-linux-x64
          path: release-assets/server-linux-x64

      - name: Rename Linux server binary
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: mv release-assets/server-linux-x64/stitch-server release-assets/server-linux-x64/stitch-server-linux-x64-${TAG}

      - name: Generate release notes
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          prev=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -n1)
          from=${prev:-$(git rev-list --max-parents=0 HEAD)}

          declare -a feats fixes improvements docs chores other

          re_bump='^chore(\([^)]*\))?!?:\ bump\ version'
          re_feat='^feat(\([^)]*\))?!?:\ (.*)'
          re_fix='^fix(\([^)]*\))?!?:\ (.*)'
          re_improvement='^(improvement|refactor|perf)(\([^)]*\))?!?:\ (.*)'
          re_docs='^docs(\([^)]*\))?!?:\ (.*)'
          re_chore='^chore(\([^)]*\))?!?:\ (.*)'

          while IFS= read -r subject; do
            # Skip version bump commits
            if [[ "$subject" =~ $re_bump ]]; then continue; fi

            if [[ "$subject" =~ $re_feat ]]; then
              feats+=("- ${BASH_REMATCH[2]}")
            elif [[ "$subject" =~ $re_fix ]]; then
              fixes+=("- ${BASH_REMATCH[2]}")
            elif [[ "$subject" =~ $re_improvement ]]; then
              improvements+=("- ${BASH_REMATCH[3]}")
            elif [[ "$subject" =~ $re_docs ]]; then
              docs+=("- ${BASH_REMATCH[2]}")
            elif [[ "$subject" =~ $re_chore ]]; then
              chores+=("- ${BASH_REMATCH[2]}")
            else
              other+=("- ${subject}")
            fi
          done < <(git log "${from}..${TAG}" --pretty=format:"%s")

          {
            if [ ${#feats[@]} -gt 0 ]; then
              echo "### New Features"
              printf '%s\n' "${feats[@]}"
            fi
            if [ ${#fixes[@]} -gt 0 ]; then
              echo "### Bug Fixes"
              printf '%s\n' "${fixes[@]}"
            fi
            if [ ${#improvements[@]} -gt 0 ]; then
              echo "### Improvements"
              printf '%s\n' "${improvements[@]}"
            fi
            if [ ${#docs[@]} -gt 0 ]; then
              echo "### Documentation"
              printf '%s\n' "${docs[@]}"
            fi
            if [ ${#chores[@]} -gt 0 ]; then
              echo "### Chores"
              printf '%s\n' "${chores[@]}"
            fi
            if [ ${#other[@]} -gt 0 ]; then
              echo "### Other Changes"
              printf '%s\n' "${other[@]}"
            fi
          } > release-notes.md

          cat release-notes.md

      - name: Create GitHub release and upload assets
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.version.outputs.tag }}
          COMMIT: ${{ needs.version.outputs.commit }}
        run: |
          shopt -s globstar nullglob
          assets=()
          for path in release-assets/**/*; do
            if [ -f "$path" ]; then
              assets+=("$path")
            fi
          done

          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release asset files were found."
            exit 1
          fi

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${assets[@]}" --clobber
          else
            gh release create "${TAG}" "${assets[@]}" --target "${COMMIT}" --title "${TAG}" --notes-file release-notes.md
          fi

  purge-caches:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Delete stale caches
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # For each cache prefix, keep only the most recently accessed entry and delete the rest
          gh api "repos/${GH_REPO}/actions/caches?per_page=100" \
            --jq '.actions_caches | sort_by(.last_accessed_at) | reverse | group_by(.key | split("-") | .[0:3] | join("-")) | map(.[1:]) | flatten | .[].id' \
          | while read -r id; do
            echo "Deleting stale cache $id"
            gh api --method DELETE "repos/${GH_REPO}/actions/caches/$id"
          done
