name: release
run-name: 'release ${{ inputs.bump }}'

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Require production branch
        run: |
          if [ "${{ github.ref_name }}" != "production" ]; then
            echo "Release workflow must run from the production branch."
            exit 1
          fi

  quality-windows:
    needs: guard
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Run tests and typecheck
        shell: bash
        run: |
          bun run --filter '*' test &
          PID_TEST=$!
          bun run typecheck &
          PID_TC=$!
          wait $PID_TEST || exit 1
          wait $PID_TC || exit 1

  quality-macos:
    needs: guard
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Run tests and typecheck
        shell: bash
        run: |
          bun run --filter '*' test &
          PID_TEST=$!
          bun run typecheck &
          PID_TC=$!
          wait $PID_TEST || exit 1
          wait $PID_TC || exit 1

  prepare-release:
    needs: [guard, quality-windows, quality-macos]
    runs-on: ubuntu-latest
    outputs:
      previous_tag: ${{ steps.publish.outputs.previous_tag }}
      version: ${{ steps.publish.outputs.version }}
      tag: ${{ steps.publish.outputs.tag }}
      release_sha: ${{ steps.publish.outputs.release_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Commit release version and tag
        id: publish
        env:
          RELEASE_BUMP: ${{ inputs.bump }}
        run: bun run release:publish

  build-windows:
    needs: prepare-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}
      - uses: ./.github/actions/setup-bun

      - name: Build all packages
        shell: bash
        run: bun run build

      - name: Copy server binary to desktop resources
        shell: bash
        run: |
          mkdir -p apps/desktop/resources
          cp packages/server/dist/stitch-server.exe apps/desktop/resources/

      - name: Package Electron app
        shell: bash
        run: npx electron-builder --win --x64 --config electron-builder.config.ts
        working-directory: apps/desktop

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stitch-windows-x64
          path: |
            apps/desktop/dist/*.exe
          if-no-files-found: error

  build-macos:
    needs: prepare-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}
      - uses: ./.github/actions/setup-bun

      - name: Build all packages
        shell: bash
        run: bun run build

      - name: Copy server binary to desktop resources
        shell: bash
        run: |
          mkdir -p apps/desktop/resources
          cp packages/server/dist/stitch-server apps/desktop/resources/

      - name: Package Electron app
        shell: bash
        run: npx electron-builder --mac --arm64 --config electron-builder.config.ts
        working-directory: apps/desktop

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stitch-macos-arm64
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
          if-no-files-found: error

  release:
    needs: [prepare-release, build-windows, build-macos]
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: stitch-windows-x64
          path: artifacts/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: stitch-macos-arm64
          path: artifacts/macos

      - name: Generate release notes body
        env:
          RELEASE_PREVIOUS_TAG: ${{ needs.prepare-release.outputs.previous_tag }}
          RELEASE_NOTES_PATH: ${{ runner.temp }}/release-notes.md
        run: bun run release:notes

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          target_commitish: ${{ needs.prepare-release.outputs.release_sha }}
          name: Stitch ${{ needs.prepare-release.outputs.tag }}
          body_path: ${{ runner.temp }}/release-notes.md
          files: |
            artifacts/windows/*
            artifacts/macos/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
